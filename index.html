<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Smart Bulb Concept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --bg-dark: #020617;
            --bg-light: #f1f5f9;
            --accent-yellow: #fbbf24;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Bulb Styling */
        .bulb-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .bulb-wrapper:active {
            transform: scale(0.95);
        }

        #bulb-glow-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 0%, rgba(251, 191, 36, 0) 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 0;
        }

        .is-on #bulb-glow-layer {
            opacity: 1;
        }

        svg {
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.1));
        }

        .is-on .bulb-glass {
            fill: var(--accent-yellow) !important;
            filter: drop-shadow(0 0 30px var(--accent-yellow));
        }

        .is-on .filament {
            stroke: #fff !important;
            stroke-width: 2;
        }

        /* Smart Switch Styling */
        .smart-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 3rem;
            margin-top: 4rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.5s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .light-mode .smart-panel {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .switch-container {
            width: 100px;
            height: 50px;
            background: #1e293b;
            border-radius: 50px;
            position: relative;
            margin: 0 auto;
            cursor: pointer;
            border: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .light-mode .switch-container {
            background: #e2e8f0;
        }

        .switch-handle {
            width: 34px;
            height: 34px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .is-on .switch-container {
            background: var(--accent-yellow);
        }

        .is-on .switch-handle {
            left: calc(100% - 38px);
            transform: scale(1.1);
        }

        /* Ambient Rays */
        .ray {
            position: absolute;
            background: linear-gradient(to bottom, var(--accent-yellow), transparent);
            width: 2px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .is-on .ray {
            opacity: 0.2;
        }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <div class="main-container" id="app">
        <!-- Ambient Rays for "Cool" Factor -->
        <div class="ray h-64 rotate-45 top-0 left-1/4"></div>
        <div class="ray h-48 -rotate-45 top-10 right-1/4"></div>

        <!-- The Bulb -->
        <div class="bulb-wrapper" onclick="toggleLight()">
            <div id="bulb-glow-layer"></div>
            <svg width="220" height="220" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Base Hardware -->
                <path d="M9 20C9 20 9 21 12 21C15 21 15 20 15 20" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M10 22H14" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
                
                <!-- Bulb Glass -->
                <path class="bulb-glass" d="M12 2C7.58172 2 4 5.58172 4 10C4 12.394 5.04832 14.543 6.7027 16.035C7.52553 16.777 8 17.801 8 18.88V19H16V18.88C16 17.801 16.4745 16.777 17.2973 16.035C18.9517 14.543 20 12.394 20 10C20 5.58172 16.4183 2 12 2Z" 
                    fill="#1e293b" stroke="currentColor" stroke-width="0.5" style="transition: all 0.6s ease;"/>
                
                <!-- Internal Tech/Filament -->
                <path class="filament" d="M12 8V12M9 11H15" stroke="#334155" stroke-width="1.5" stroke-linecap="round" style="transition: all 0.4s ease;"/>
            </svg>
        </div>

        <!-- Control Panel -->
        <div class="smart-panel">
            <h2 class="text-sm font-bold uppercase tracking-[0.3em] text-slate-500 mb-2">Smart Control</h2>
            <h1 id="statusLabel" class="text-3xl font-extrabold mb-8 transition-all">OFFLINE</h1>
            
            <div class="switch-container" onclick="toggleLight()">
                <div class="switch-handle"></div>
            </div>

            <div class="mt-10 flex justify-between items-center text-xs font-semibold text-slate-500 uppercase tracking-widest px-4">
                <span>Intensity: <span id="intensityVal">0%</span></span>
                <span>System: Active</span>
            </div>
        </div>

        <footer class="absolute bottom-10 text-slate-600 text-[10px] uppercase tracking-[0.5em] font-bold">
            Lumina Pro • Generation 4
        </footer>
    </div>

    <script>
        const app = document.getElementById('app');
        const statusLabel = document.getElementById('statusLabel');
        const intensityVal = document.getElementById('intensityVal');
        let isOn = false;

        function toggleLight() {
            isOn = !isOn;
            
            if (isOn) {
                app.parentElement.classList.add('is-on');
                document.body.style.backgroundColor = "#0f172a";
                document.body.classList.remove('light-mode');
                
                statusLabel.innerText = "ONLINE";
                statusLabel.style.color = "#fbbf24";
                intensityVal.innerText = "100%";
                
                // Add a "pop" animation to the panel
                document.querySelector('.smart-panel').style.transform = "translateY(-10px)";
            } else {
                app.parentElement.classList.remove('is-on');
                document.body.style.backgroundColor = "#020617";
                document.body.classList.remove('light-mode');
                
                statusLabel.innerText = "OFFLINE";
                statusLabel.style.color = "";
                intensityVal.innerText = "0%";
                
                document.querySelector('.smart-panel').style.transform = "translateY(0)";
            }
        }

        // Add a secondary "True Light Mode" trigger if desired (optional)
        // For now, it behaves as a High-End Smart Switch
    </script>
</body>
</html>
