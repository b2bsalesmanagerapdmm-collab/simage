<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoonify AI - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ensure 1:1 Aspect Ratio for Images */
        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            overflow: hidden;
            border-radius: 0.75rem;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-container:hover .overlay {
            opacity: 1;
        }

        .custom-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: white;
        }

        .custom-input:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="py-12 px-4 md:px-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">
                Cartoonify AI
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">
                Generate stunning 1:1 stylized cartoon portraits using advanced artificial intelligence.
            </p>
        </header>

        <!-- Generation Panel -->
        <div class="glass-card p-6 md:p-8 mb-12 max-w-3xl mx-auto">
            <div class="flex flex-col gap-5">
                <div class="flex flex-col md:flex-row gap-3">
                    <input 
                        id="promptInput" 
                        type="text" 
                        class="custom-input flex-1 p-4 rounded-xl outline-none transition-all text-lg"
                        placeholder="e.g., A cyberpunk cat wearing neon goggles..."
                    >
                    <button 
                        id="generateBtn"
                        class="bg-pink-600 hover:bg-pink-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i class="fas fa-wand-magic-sparkles"></i>
                        <span>Generate</span>
                    </button>
                </div>
                
                <div id="statusMessage" class="hidden items-center gap-3 text-pink-400 font-medium justify-center">
                    <div class="loader"></div>
                    <span>Rendering your cartoon...</span>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="mb-6 flex items-center justify-between">
            <h2 class="text-xl font-semibold text-slate-200">Your Gallery</h2>
            <span id="imageCount" class="text-sm text-slate-500">0 images generated</span>
        </div>

        <!-- Flexbox Gallery Layout -->
        <div id="gallery" class="flex flex-wrap gap-6 justify-start">
            <!-- Generated images will appear here as flex items -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-24 border-2 border-dashed border-slate-800 rounded-3xl opacity-30">
            <i class="fas fa-images text-7xl mb-6"></i>
            <p class="text-xl font-medium">Ready to start creating?</p>
        </div>

        <!-- Footer -->
        <footer class="mt-20 pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">
            <p>Built with ❤️ for GitHub • Aspect Ratio 1:1 • Dark Mode Enabled</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-100 text-slate-900 px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 opacity-0 transition-opacity pointer-events-none">
        <i class="fas fa-check-circle text-green-600"></i>
        <span>Copied to clipboard!</span>
    </div>

    <script>
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('emptyState');
        const statusMessage = document.getElementById('statusMessage');
        const imageCountDisplay = document.getElementById('imageCount');
        const toast = document.getElementById('toast');

        let imageCount = 0;
        const apiKey = ""; // API Key handled by environment

        async function generateCartoon(prompt) {
            const cartoonPrompt = `High quality 1:1 stylized cartoon character design of: ${prompt}. Professional vector art, vibrant colors, clean thick outlines, trending on artstation.`;
            
            toggleLoading(true);

            let retries = 0;
            const maxRetries = 5;
            const backoffDelays = [1000, 2000, 4000, 8000, 16000];
            
            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: cartoonPrompt },
                            parameters: { sampleCount: 1 }
                        })
                    });

                    if (!response.ok) throw new Error('Generation failed');

                    const data = await response.json();
                    const base64Image = data.predictions[0].bytesBase64Encoded;
                    const imageUrl = `data:image/png;base64,${base64Image}`;
                    
                    addImageToGallery(imageUrl, prompt);
                    toggleLoading(false);
                    return;

                } catch (error) {
                    const delay = backoffDelays[retries] || 16000;
                    retries++;
                    await new Promise(res => setTimeout(res, delay));
                }
            }

            showErrorNotification();
            toggleLoading(false);
        }

        function toggleLoading(isLoading) {
            generateBtn.disabled = isLoading;
            statusMessage.style.display = isLoading ? 'flex' : 'none';
        }

        function addImageToGallery(url, prompt) {
            emptyState.style.display = 'none';
            imageCount++;
            imageCountDisplay.innerText = `${imageCount} image${imageCount > 1 ? 's' : ''} generated`;
            
            // Flexbox child container
            const card = document.createElement('div');
            card.className = "image-container animate-fade-in w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.33%-16px)] xl:w-[calc(25%-18px)]";
            
            card.innerHTML = `
                <div class="glass-card overflow-hidden group relative">
                    <div class="image-wrapper">
                        <img src="${url}" alt="${prompt}">
                    </div>
                    <div class="overlay absolute inset-0 bg-slate-950/80 opacity-0 transition-opacity flex flex-col justify-end p-5">
                        <p class="text-slate-200 text-xs mb-4 line-clamp-3 leading-relaxed">"${prompt}"</p>
                        <div class="flex gap-2">
                            <button onclick="downloadImage('${url}')" class="flex-1 bg-white hover:bg-slate-200 text-slate-900 py-2.5 rounded-lg font-bold text-xs flex items-center justify-center gap-2 transition-colors">
                                <i class="fas fa-download"></i> Save
                            </button>
                            <button onclick="copyToClipboard('${url}')" class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-2.5 rounded-lg font-bold text-xs flex items-center justify-center gap-2 transition-colors">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            gallery.prepend(card);
        }

        function downloadImage(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = `cartoon-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function copyToClipboard(url) {
            const el = document.createElement('textarea');
            el.value = url; // In a real environment, you'd copy the blob, but copying the data-uri is a safe fallback
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function showErrorNotification() {
            const errorDiv = document.createElement('div');
            errorDiv.className = "fixed top-5 right-5 bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl z-50 animate-fade-in";
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> Service temporary unavailable. Please try again.`;
            document.body.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 4000);
        }

        generateBtn.addEventListener('click', () => {
            const val = promptInput.value.trim();
            if (val) generateCartoon(val);
        });

        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = promptInput.value.trim();
                if (val) generateCartoon(val);
            }
        });
    </script>
</body>
</html>
